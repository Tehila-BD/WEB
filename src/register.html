<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-blue-600 p-4 text-white shadow-md w-full">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">My Tirgul App</h1>
            <ul class="flex space-x-6">
                <li><a href="../index.html" class="hover:underline">Home</a></li>
                <li><a href="./login.html" class="hover:underline">Login</a></li>
                <li><a href="./register.html" class="hover:underline">Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Register</h1>
            <form id="registerForm" novalidate>

                <div class="mb-4">
                    <label for="userName" class="block mb-1 font-medium text-gray-700">Username</label>
                    <input type="text" id="userName" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                </div>

                <div class="mb-4">
                    <label for="userEmail" class="block mb-1 font-medium text-gray-700">Email</label>
                    <input type="email" id="userEmail" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                </div>

                <div class="mb-4">
                    <label for="userPass" class="block mb-1 font-medium text-gray-700">Password</label>
                    <input type="password" id="userPass" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                </div>

                <div class="mb-4">
                    <label for="userPassConfirm" class="block mb-1 font-medium text-gray-700">Confirm Password</label>
                    <input type="password" id="userPassConfirm" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                </div>

                <div class="mb-6">
                     <label for="userBirthDate" class="block mb-1 font-medium text-gray-700">Date of Birth</label>
                     <input type="date" id="userBirthDate" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                </div>

                <div id="arithmetic-captcha-container" class="space-y-2 mb-4 bg-gray-50 p-3 rounded border">
                    <label for="captcha-answer" class="block text-sm font-medium text-gray-700">CAPTCHA 1: Solve this:</label>
                    <div class="flex items-center space-x-4">
                        <span id="arithmetic-challenge" class="text-lg font-semibold text-gray-800 bg-gray-200 p-2 rounded"></span>
                        <button type="button" id="refresh-arithmetic-captcha" class="p-1 hover:bg-gray-100 rounded" title="Refresh">
                            <img class="h-6" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/RECAPTCHA_icon.svg/150px-ReCAPTCHA_icon.svg.png" alt="refresh">
                        </button>
                    </div>
                    <input type="number" id="captcha-answer" required placeholder="Answer" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-400 focus:outline-none" />
                </div>

                <div id="captcha-error-message" class="text-red-500 text-sm font-bold mb-2 text-center h-5"></div>

                <div class="mb-6 flex justify-center">
                    <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
                </div>

                <button type="submit" class="w-full p-3 bg-blue-500 text-white rounded font-bold hover:bg-blue-600 transition-colors shadow-md">
                    Register Now
                </button>

                <div id="register-message" class="text-sm font-bold mt-4 text-center min-h-[1.5rem]"></div>
            </form>

            <p class="text-center mt-4 text-sm text-gray-600">
                Already have an account? <a href="./login.html" class="text-blue-500 hover:underline">Login</a>
            </p>
        </div>
    </main>

    <script src="./users.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./register.js"></script>
</body>
</html>
