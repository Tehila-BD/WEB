<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-blue-600 p-4 text-white shadow-md w-full">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">My Tirgul App</h1>
            <ul class="flex space-x-6">
                <li><a href="../index.html" class="hover:underline">Home</a></li>
                <li><a href="./login.html" class="hover:underline">Login</a></li>
                <li><a href="./register.html" class="hover:underline">Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h1>
            <form id="loginForm">
                <div class="mb-4">
                    <label for="userEmail" class="block mb-1 font-medium text-gray-700">Username or Email</label>
                    <input type="text" id="userEmail" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <div class="mb-6">
                    <label for="userPass" class="block mb-1 font-medium text-gray-700">Password</label>
                    <input type="password" id="userPass" required class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <button type="submit" class="w-full p-3 bg-blue-500 text-white rounded font-bold hover:bg-blue-600 transition-colors">
                    Login
                </button>
            </form>
            <p class="text-center mt-4 text-sm text-gray-600">
                Don't have an account? <a href="./register.html" class="text-blue-500 hover:underline">Register</a>
            </p>
        </div>
    </main>

    <script src="./users.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./login.js"></script>
</body>
</html>
